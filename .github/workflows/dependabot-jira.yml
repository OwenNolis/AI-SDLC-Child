name: Dependabot → Jira

on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  jira-create:
    if: github.event.action != 'closed' && github.event.pull_request.user.login == 'dependabot[bot]'
    uses: OwenNolis/AI-SDLC/.github/workflows/dependabot-jira.yml@main
    secrets: inherit
    with:
      mode: create
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_DOMAIN: ${{ vars.JIRA_DOMAIN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

  jira-close:
    if: github.event.action == 'closed' && github.event.pull_request.user.login == 'dependabot[bot]'
    uses: OwenNolis/AI-SDLC/.github/workflows/dependabot-jira.yml@main
    secrets: inherit
    with:
      mode: close
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_DOMAIN: ${{ vars.JIRA_DOMAIN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
